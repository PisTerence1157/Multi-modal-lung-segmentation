# 3D U-Net configuration for CT segmentation
# Inherits from base.yaml

model:
  name: "unet3d"
  in_channels: 1
  out_channels: 1
  features: [32, 64, 128, 256]  # Smaller than 2D due to memory
  dropout: 0.1
  trilinear: true

# 3D training typically needs smaller batch size
training:
  batch_size: 2
  num_epochs: 50

# CT-specific settings
ct:
  window_center: -600  # Lung window
  window_width: 1500
  target_spacing: [1.0, 1.0, 1.0]
  patch_size: [128, 128, 32]
  patches_per_volume: 4
